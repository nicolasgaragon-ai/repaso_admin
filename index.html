<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repaso Completo — Administración Organizacional</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;color:#1a1a1a}
#app{padding:16px;max-width:520px;margin:0 auto;padding-bottom:40px}
.main-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.main-sub{font-size:12px;color:#888;margin-bottom:14px}

/* UNIDADES */
.units{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.unit-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;font-weight:600;color:#666;cursor:pointer;font-family:inherit;transition:all .15s}
.unit-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* TABS */
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tab{padding:5px 12px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:11px;color:#666;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

.progress{height:4px;background:#e8e8e8;border-radius:2px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

.card-counter{font-size:12px;color:#aaa;text-align:center;margin-bottom:8px}

.scene{width:100%;height:380px;perspective:1000px;cursor:pointer;margin-bottom:14px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:22px;border:1.5px solid #e0e0e0;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.back{transform:rotateY(180deg);justify-content:flex-start;overflow:hidden}
.back-inner{width:100%;height:100%;overflow-y:auto}
.card-label{font-size:11px;font-weight:600;letter-spacing:.05em;margin-bottom:12px;padding:4px 12px;border-radius:10px}
.card-q{font-size:16px;font-weight:600;color:#1a1a1a;text-align:center;line-height:1.5}
.card-hint{font-size:12px;color:#bbb;margin-top:14px}
.back-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:8px;width:100%}
.item{display:flex;gap:8px;margin-bottom:7px;font-size:13px;color:#1a1a1a;line-height:1.5}
.item.sub{padding-left:14px}
.num-badge{min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.nav{display:flex;gap:8px}
.nav-btn{flex:1;padding:12px;border:1.5px solid #ddd;border-radius:10px;background:#fff;font-size:13px;color:#1a1a1a;cursor:pointer;font-family:inherit}
.nav-btn:disabled{opacity:.3;cursor:default}
.flip-btn{flex:2;padding:12px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

/* colores */
.c1{background:#E6F1FB;color:#0C447C} .c2{background:#EAF3DE;color:#27500A}
.c3{background:#FAEEDA;color:#633806} .c4{background:#FBEAF0;color:#72243E}
.c5{background:#E1F5EE;color:#085041} .c6{background:#EEEDFE;color:#3C3489}
.c7{background:#FAECE7;color:#4A1B0C} .c8{background:#F1EFE8;color:#2C2C2A}
.p1{background:#378ADD} .p2{background:#639922} .p3{background:#BA7517}
.p4{background:#D4537E} .p5{background:#1D9E75} .p6{background:#7F77DD}
.p7{background:#D85A30} .p8{background:#888780}

@media (prefers-color-scheme: dark){
  body{background:#111;color:#eee}
  .unit-btn,.tab{background:#222;border-color:#333;color:#aaa}
  .unit-btn.active,.tab.active{background:#eee;color:#111;border-color:#eee}
  .face{background:#1e1e1e;border-color:#333;box-shadow:0 2px 12px rgba(0,0,0,.3)}
  .back-title{border-bottom-color:#333}
  .item{color:#ddd}
  .nav-btn{background:#1e1e1e;border-color:#333;color:#eee}
  .flip-btn{background:#eee;color:#111}
  .progress{background:#2a2a2a}
  .card-q{color:#eee}
}
</style>
</head>
<body>
<div id="app">
  <div class="main-title">Administración Organizacional</div>
  <div class="main-sub">Unidad 1 — Repaso completo para examen</div>
  <div class="units" id="units"></div>
  <div class="tabs" id="tabs"></div>
  <div class="progress"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="card-counter" id="counter"></div>
  <div class="scene" onclick="flipCard()">
    <div class="card" id="card">
      <div class="face front" id="front-face"></div>
      <div class="face back" id="back-face"></div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← Ant.</button>
    <button class="flip-btn" onclick="flipCard()">Voltear tarjeta</button>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">Sig. →</button>
  </div>
</div>

          title:"Teorías X, Y y Z — McGregor",
          items:[
            "Teoría X (visión PESIMISTA):",
            "  • El trabajador es FLOJO por naturaleza",
            "  • Evita el trabajo y las responsabilidades",
            "  • Necesita control estricto, supervisión y amenazas",
            "  • No tiene ambición ni creatividad",
            "Teoría Y (visión OPTIMISTA):",
            "  • El trabajador puede ser CREATIVO y responsable",
            "  • Se automotiva si las condiciones son favorables",
            "  • Acepta y busca responsabilidades",
            "Teoría Z (modelo japonés):",
            "  • Trabajo en equipo y toma de decisiones por consenso",
            "  • Lealtad mutua empresa-trabajador",
            "  • Empleo de por vida",
            "  • Desarrollo integral del trabajador"
          ]
        }
      ]
    }
  }
};

// Estado
var units = Object.keys(DATA);
var activeUnit = units[0];
var activeDeck = '';
var cardIndex = 0;
var isFlipped = false;

function getDeckKeys(){ return Object.keys(DATA[activeUnit].decks); }
function getCards(){ return DATA[activeUnit].decks[activeDeck]; }

function buildUnits(){
  var el = document.getElementById('units');
  el.innerHTML = '';
  units.forEach(function(u){
    var b = document.createElement('button');
    b.className = 'unit-btn' + (u===activeUnit?' active':'');
    b.textContent = u;
    b.onclick = function(){ activeUnit=u; activeDeck=getDeckKeys()[0]; cardIndex=0; isFlipped=false; buildUnits(); buildTabs(); render(); };
    el.appendChild(b);
  });
}

function buildTabs(){
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  var keys = getDeckKeys();
  if(!activeDeck || keys.indexOf(activeDeck)===-1) activeDeck = keys[0];
  keys.forEach(function(k){
    var b = document.createElement('button');
    b.className = 'tab' + (k===activeDeck?' active':'');
    b.textContent = k;
    b.onclick = function(){ activeDeck=k; cardIndex=0; isFlipped=false; buildTabs(); render(); };
    el.appendChild(b);
  });
}

function render(){
  var unit = DATA[activeUnit];
  var cards = getCards();
  if(!cards || cards.length===0) return;
  var card = cards[cardIndex];
  var total = cards.length;

  document.getElementById('counter').textContent = 'Tarjeta '+(cardIndex+1)+' de '+total;
  document.getElementById('prog-fill').style.width = (((cardIndex+1)/total)*100)+'%';
  document.getElementById('prog-fill').className = 'prog-fill '+unit.prog;
  document.getElementById('card').classList.toggle('flipped', isFlipped);

  // Front
  document.getElementById('front-face').innerHTML =
    '<span class="card-label '+unit.color+'">'+activeUnit+' — '+activeDeck+'</span>'+
    '<div class="card-q">'+card.q+'</div>'+
    '<div class="card-hint">Toca para ver la respuesta</div>';

  // Back
  var html = '';
  card.items.forEach(function(item){
    if(item===''){html+='<div style="height:5px"></div>';return;}
    if(item.startsWith('  ')){
      html+='<div class="item sub"><span style="color:#aaa;font-size:11px">→</span><span>'+item.trim()+'</span></div>';
    } else {
      var m=item.match(/^(\d+)\./);
      if(m){
        html+='<div class="item"><span class="num-badge '+unit.color+'">'+m[1]+'</span><span>'+item.replace(/^\d+\.\s*/,'')+'</span></div>';
      } else {
        html+='<div class="item"><span style="color:#aaa;margin-top:3px">•</span><span>'+item+'</span></div>';
      }
    }
  });

  document.getElementById('back-face').innerHTML =
    '<div class="back-inner"><div class="back-title">'+card.title+'</div>'+html+'</div>';

  document.getElementById('btn-prev').disabled = cardIndex===0;
  document.getElementById('btn-next').disabled = cardIndex===total-1;
}

function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('card').classList.toggle('flipped',isFlipped);
}

function navigate(dir){
  isFlipped=false; cardIndex+=dir; render();
}

// Init
activeDeck = getDeckKeys()[0];
buildUnits(); buildTabs(); render();
</script>
</body>
</html>
